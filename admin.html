<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YEP Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Switzer:wght@300;400;500;600;700&family=Fragment+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08080c;--surface:#0f0f16;--card:#15151f;--border:#252535;--accent:#9b7aff;--accent-glow:rgba(155,122,255,0.1);--accent-bright:#b49aff;--accent-deep:#7c5ce0;--green:#34d399;--green-glow:rgba(52,211,153,0.12);--red:#f87171;--white:#eeedf5;--slate:#c4c0d8;--muted:#8a86a3;--dim:#5c586e;--font-d:'Clash Display',system-ui,sans-serif;--font-b:'Switzer',system-ui,sans-serif;--font-m:'Fragment Mono',monospace}
body{min-height:100vh;background:var(--bg);color:var(--white);font-family:var(--font-b)}

/* Lock screen */
#lock{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center}
#lock.open{display:none}
.lock-box{max-width:340px;width:100%;padding:0 24px;text-align:center}
.lock-box h1{font-family:var(--font-d);font-size:28px;font-weight:700;color:var(--accent-bright);margin-bottom:4px}
.lock-box p{font-size:11px;color:var(--muted);margin-bottom:28px;letter-spacing:4px;text-transform:uppercase}
.lock-input{width:100%;padding:16px;font-size:20px;font-family:var(--font-m);background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--white);outline:none;text-align:center;letter-spacing:8px;transition:all .3s}
.lock-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.lock-btn{width:100%;padding:15px;font-size:13px;font-weight:600;font-family:var(--font-b);letter-spacing:4px;text-transform:uppercase;background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;border:none;border-radius:10px;cursor:pointer;margin-top:14px;transition:all .3s;box-shadow:0 4px 20px var(--accent-glow)}
.lock-btn:hover{transform:translateY(-2px)}
.lock-err{font-size:12px;color:var(--red);min-height:20px;margin-top:10px}

/* Main layout */
#main{display:none;max-width:800px;margin:0 auto;padding:28px 24px}
#main.open{display:block}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.header h1{font-family:var(--font-d);font-size:22px;font-weight:700;color:var(--accent-bright);letter-spacing:2px}
.header .logout{font-size:11px;color:var(--muted);cursor:pointer;letter-spacing:2px;transition:color .2s}
.header .logout:hover{color:var(--red)}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--surface);border-radius:10px;padding:4px;border:1px solid var(--border)}
.tab{flex:1;padding:12px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:8px;transition:all .2s;text-align:center;letter-spacing:1px}
.tab:hover{color:var(--slate)}
.tab.active{background:var(--accent);color:#fff}

/* Sections */
.section{display:none}
.section.active{display:block}

/* Form */
.add-form{display:flex;gap:12px;margin-bottom:20px}
.add-form input{flex:1;padding:12px 14px;font-size:13px;font-family:var(--font-b);background:var(--surface);border:1.5px solid var(--border);border-radius:8px;color:var(--white);outline:none;transition:all .3s}
.add-form input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.add-form input::placeholder{color:var(--dim)}
.add-form button{padding:12px 24px;font-size:12px;font-weight:600;font-family:var(--font-b);letter-spacing:2px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;white-space:nowrap;transition:all .2s}
.add-form button:hover{background:var(--accent-deep)}

/* Team list */
.team-card{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:8px;transition:border-color .2s}
.team-card:hover{border-color:var(--border)}
.team-name{font-size:14px;font-weight:600;color:var(--white)}
.team-code{font-size:11px;font-family:var(--font-m);color:var(--dim);margin-top:2px;letter-spacing:2px}
.team-remove{font-size:11px;color:var(--red);cursor:pointer;padding:6px 12px;border-radius:6px;border:1px solid rgba(248,113,113,.2);background:rgba(248,113,113,.06);transition:all .2s}
.team-remove:hover{background:rgba(248,113,113,.15)}

/* Submissions */
.sub-round-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.sub-tab{padding:8px 14px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:6px;border:1px solid var(--border);transition:all .2s;letter-spacing:1px}
.sub-tab:hover{border-color:var(--accent);color:var(--slate)}
.sub-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.sub-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px}
.sub-team{font-size:13px;font-weight:600;color:var(--white);margin-bottom:6px}
.sub-text{font-size:13px;color:var(--slate);line-height:1.7;background:var(--bg);border-radius:8px;padding:12px;border:1px solid var(--border);max-height:120px;overflow-y:auto}
.sub-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:12px;margin-left:8px}
.sub-badge.yes{color:var(--green);background:var(--green-glow)}
.sub-badge.no{color:var(--dim);background:rgba(92,88,110,.15)}

.empty{text-align:center;padding:40px;color:var(--dim);font-size:13px}
.ft{text-align:center;margin-top:40px;font-size:10px;color:var(--dim);letter-spacing:3px;padding-bottom:20px}
</style>
</head>
<body>

<!-- Lock Screen -->
<div id="lock">
  <div class="lock-box">
    <h1>YEP Admin</h1>
    <p>Creya Learning & Research</p>
    <input type="password" class="lock-input" id="code-input" placeholder="• • • •" maxlength="10">
    <button class="lock-btn" onclick="unlock()">UNLOCK</button>
    <div class="lock-err" id="lock-err"></div>
  </div>
</div>

<!-- Main Panel -->
<div id="main">
  <div class="header">
    <h1>YEP Admin</h1>
    <span class="logout" onclick="lockOut()">↩ LOCK</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('teams')">👥 Teams</div>
    <div class="tab" onclick="switchTab('subs')">📝 Submissions</div>
  </div>

  <!-- Teams Section -->
  <div class="section active" id="s-teams">
    <div class="add-form">
      <input type="text" id="new-name" placeholder="Team name (e.g., Team Alpha)">
      <input type="text" id="new-code" placeholder="Code (e.g., YEP-ALPHA-2026)" style="font-family:var(--font-m);text-transform:uppercase">
      <button onclick="addTeam()">ADD</button>
    </div>
    <div id="teams-list"></div>
  </div>

  <!-- Submissions Section -->
  <div class="section" id="s-subs">
    <div class="sub-round-tabs" id="round-tabs"></div>
    <div id="subs-list"></div>
  </div>

  <div class="ft">© Creya Learning and Research. All rights reserved.</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBzffEt0h_gGFMHLFH8JlTzsUWCJeorJdQ",
  authDomain:"yep-challenge.firebaseapp.com",
  projectId:"yep-challenge",
  storageBucket:"yep-challenge.firebasestorage.app",
  messagingSenderId:"204611665583",
  appId:"1:204611665583:web:4ca0b540450d3511ac1e5a"
});
var db = firebase.firestore();

var ROUNDS = ["Intro to Entrepreneurship","The Start-Up","Problem & Solution","Trial and Error","Money Matters","Marketing","Grand Challenge"];
var currentRoundTab = 0;

// ═══ LOCK ═══
function unlock() {
  var code = document.getElementById("code-input").value.trim();
  if (code === "0000") {
    document.getElementById("lock").classList.add("open");
    document.getElementById("main").classList.add("open");
    loadTeams();
  } else {
    document.getElementById("lock-err").textContent = "Wrong code.";
    document.getElementById("code-input").value = "";
  }
}

function lockOut() {
  document.getElementById("lock").classList.remove("open");
  document.getElementById("main").classList.remove("open");
  document.getElementById("code-input").value = "";
}

document.getElementById("code-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") unlock();
});

// ═══ TABS ═══
function switchTab(name) {
  document.querySelectorAll(".section").forEach(function(s) { s.classList.remove("active"); });
  document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
  document.getElementById("s-" + name).classList.add("active");
  event.currentTarget.classList.add("active");
  if (name === "teams") loadTeams();
  if (name === "subs") loadSubmissions();
}

// ═══ TEAMS ═══
function loadTeams() {
  db.collection("teams").orderBy("createdAt", "desc").onSnapshot(function(snap) {
    var html = "";
    snap.forEach(function(doc) {
      var t = doc.data();
      html += '<div class="team-card">' +
        '<div><div class="team-name">' + t.name + '</div><div class="team-code">' + t.code + '</div></div>' +
        '<span class="team-remove" onclick="removeTeam(\'' + doc.id + '\',\'' + t.name + '\')">Remove</span>' +
        '</div>';
    });
    document.getElementById("teams-list").innerHTML = html || '<div class="empty">No teams yet. Add one above.</div>';
  });
}

function addTeam() {
  var name = document.getElementById("new-name").value.trim();
  var code = document.getElementById("new-code").value.trim().toUpperCase();
  if (!name || !code) { alert("Enter both team name and code."); return; }
  db.collection("teams").add({
    name: name,
    code: code,
    currentStage: "Waiting",
    currentRound: 0,
    currentStep: 0,
    status: "offline",
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function() {
    document.getElementById("new-name").value = "";
    document.getElementById("new-code").value = "";
  }).catch(function(e) { alert("Error: " + e.message); });
}

function removeTeam(id, name) {
  if (confirm("Remove " + name + "?")) {
    db.collection("teams").doc(id).delete();
  }
}

// ═══ SUBMISSIONS ═══
function loadSubmissions() {
  var tabs = "";
  ROUNDS.forEach(function(r, i) {
    tabs += '<div class="sub-tab' + (i === currentRoundTab ? ' active' : '') + '" onclick="showRound(' + i + ')">' + (i < 6 ? 'R' + (i + 1) : 'Grand') + '</div>';
  });
  document.getElementById("round-tabs").innerHTML = tabs;
  showRound(currentRoundTab);
}

function showRound(idx) {
  currentRoundTab = idx;
  document.querySelectorAll(".sub-tab").forEach(function(t, i) {
    t.classList.toggle("active", i === idx);
  });
  document.getElementById("subs-list").innerHTML = '<div class="empty">Loading...</div>';

  // Get teams first
  db.collection("teams").get().then(function(teamsSnap) {
    var teams = [];
    teamsSnap.forEach(function(doc) { teams.push({ id: doc.id, name: doc.data().name, code: doc.data().code }); });

    // Get submissions for this round
    var collection = idx < 6 ? "submissions" : "grandChallenge";
    var query = idx < 6 ? db.collection(collection).where("round", "==", idx) : db.collection(collection);

    query.get().then(function(subsSnap) {
      var subs = {};
      subsSnap.forEach(function(doc) {
        var d = doc.data();
        subs[d.teamId] = d;
      });

      var html = "";
      teams.forEach(function(t) {
        var sub = subs[t.id];
        var text = "";
        if (sub) {
          if (idx === 6) {
            text = "<strong>Startup:</strong> " + (sub.startupName || "—") + "<br><strong>Pitch:</strong> " + (sub.elevatorPitch || "—");
          } else {
            text = sub.challengeAnswer || "Submitted";
          }
        }

        html += '<div class="sub-card">' +
          '<div class="sub-team">' + t.name +
          '<span class="sub-badge ' + (sub ? 'yes' : 'no') + '">' + (sub ? 'Submitted' : 'Pending') + '</span></div>' +
          (text ? '<div class="sub-text">' + text + '</div>' : '') +
          '</div>';
      });

      document.getElementById("subs-list").innerHTML = html || '<div class="empty">No submissions yet for ' + ROUNDS[idx] + '</div>';
    });
  });
}
</script>
</body>
</html>
